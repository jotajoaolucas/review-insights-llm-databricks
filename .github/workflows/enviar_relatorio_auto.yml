name: Relatório VoC — baixar do Databricks e enviar

# Fluxo 100% automático:
#   1. Baixa o relatório HTML do Volume do Databricks via Files API
#   2. Envia por email via Gmail
# Nenhum passo manual — nem baixar, nem commitar.

on:
  # botão manual na aba Actions
  workflow_dispatch:

  # agendado: toda segunda-feira às 9h UTC (6h de Brasília)
  # ajuste/descomente conforme desejar
  schedule:
    - cron: "0 9 * * 1"

jobs:
  enviar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Baixar relatório do Volume do Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p reports
          # caminho do arquivo no Volume (ajuste se o nome/pasta mudar)
          VOLUME_PATH="/Volumes/voc_project/bronze/raw_files/relatorio_voc.html"

          echo "Baixando ${VOLUME_PATH} do Databricks..."
          curl --fail --silent --show-error \
            --request GET "${DATABRICKS_HOST}/api/2.0/fs/files${VOLUME_PATH}" \
            --header "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            --output reports/relatorio_voc.html

          echo "Arquivo baixado:"
          ls -la reports/

      - name: Enviar relatório por email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          REPORT_PATH: reports/relatorio_voc.html
        run: python scripts/send_report.py
